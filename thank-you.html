    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        :root {
            --color-primary: #2563EB;
            --color-black: #0F172A;
            --color-gray-dark: #475569;
            --color-gray-light: #F1F5F9;
            --color-green: #10B981;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: #F8FAFC;
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .thank-you-card {
            background: #ffffff;
            max-width: 540px;
            width: 100%;
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Animated SVG Checkmark */
        .checkmark-container {
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
        }

        .checkmark {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            stroke-width: 4;
            stroke: var(--color-green);
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px var(--color-green);
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 4;
            stroke-miterlimit: 10;
            stroke: var(--color-green);
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke: var(--color-green);
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
        }

        @keyframes stroke {
            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes scale {
            0%, 100% {
                transform: none;
            }
            50% {
                transform: scale3d(1.15, 1.15, 1);
            }
        }

        @keyframes fill {
            100% {
                box-shadow: inset 0px 0px 0px 50px #ffffff;
            }
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
            color: var(--color-black);
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--color-gray-dark);
            margin-bottom: 36px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--color-primary);
            color: #ffffff;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.05rem;
            padding: 16px 36px;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
            background-color: #1E40AF;
        }

        .btn i {
            font-size: 0.95rem;
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: translateX(-4px);
        }

        @media (max-width: 480px) {
            .thank-you-card {
                padding: 36px 20px;
            }
            
            h1 {
                font-size: 1.85rem;
            }
            
            p {
                font-size: 0.95rem;
                margin-bottom: 28px;
            }
        }
    </style>

</head>
<body>

    <div class="thank-you-card">
        <div class="checkmark-container">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>
        
        <h1>Кандидатурата е изпратена!</h1>
        <p>Благодарим ви! Нашият екип ще се запознае с детайлите за вашия бизнес и ще се свърже с вас по телефона в най-кратки срокове (обикновено в рамките на 24 часа).</p>
        
        <a href="index.html" class="btn">

    </div>

</body>
